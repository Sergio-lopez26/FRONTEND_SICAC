<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="stylesRecuperarPass.css">
    <link rel="icon" type="image/x-icon" href="LogoIcono.png">
    <title>Recuperación</title>
</head>
<body>
    <div>
        <img id="logo" src="logo.png" alt="Logo">
    </div>
    <header>
        <h1>Recuperación de Contraseña</h1>
    </header>
    <form id="formUsuario" action="" method="post">
        <div class="mb-3">
            <label for="email" class="form-label d-block mb-3">Digite su Correo/Email</label>
            <input type="email" name="email" id="email" class="form-control" style="border: 2px solid #d0e2ff; border-radius: 12px;" required>
        </div>

        <div class="d-flex justify-content-end mt-3">
            <button id="btnEnviar" type="button"  class="btn btn-primary" style="border-radius: 12px; padding: 8px 20px;">Enviar Código</button>
        </div>

        <div id="Validacion" style="display: none;" class="mb-3" >
            <p>
            Al correo ingresado le será entregado un código de validación, el cual deberá digitar a continuación
            </p>

            <label for="cod" class="form-label d-block mb-3">Código de Validación</label>
            <input type="number" name="cod" id="cod" class="form-control" style="border: 2px solid #d0e2ff; border-radius: 12px;">

            <div class="d-flex w-100 gap-3 mt-4">
                <button id="btnValidar" type="submit" class="btn btn-success flex-fill py-2">Validar Código</button>
                <button id="btnCancelar" type="button" class="btn btn-secondary flex-fill py-2" onclick="cancelar()">Cancelar</button>
            </div>
        </div>
    </form>

    <div class="modal fade" id="validar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 380px;">
            <div class="modal-content text-center border-0 p-4" style="border-radius: 16px;">
            
            <h4 class="text-success fw-bold mb-3">¡Código Enviado!</h4>
            
            <p class="text-muted mb-4">Estimado Usuarios. Por favor revisar su bandeja de entrada. Hemos enviado un código de validación.</p>
            
            <button type="button" class="btn btn-primary w-100 py-2" data-bs-dismiss="modal" id="btnCerrarV" style="border-radius: 12px;">
                Aceptar
            </button>

            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnEnviar = document.getElementById("btnEnviar");
            const email = document.getElementById("email");
            const validacion = document.getElementById("Validacion");
            const cod = document.getElementById("cod");
            
            const alertValida = new bootstrap.Modal(document.getElementById('validar'));
            const formUsuario = document.getElementById("formUsuario");

            btnEnviar.addEventListener("click", () => {
                if (!email.checkValidity()) {
                    email.reportValidity();
                    return;
                }

                alertValida.show();

                email.readOnly = true;
                btnEnviar.disabled = true;
            });
           
            document.getElementById("btnCerrarV").addEventListener("click", () => {
                validacion.style.display = "block";
                cod.required = true;
                cod.focus();
            });

            formUsuario.addEventListener("submit", (event) => {
                event.preventDefault(); 
                window.location.href = "CambiarPass.html"; 
            });
        });

        function cancelar(){
            location.reload();
        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
