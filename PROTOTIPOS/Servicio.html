<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="StylesServicio.css">
    <link rel="icon" type="image/x-icon" href="LogoIcono.png">
    <title>Servicio</title>
</head>
 <body>
     <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark" style="height: 60px;">
        <div class="container-fluid">
            <img id="logo" src="logo.png" alt="Logo">
            <a class="navbar-brand">SICAC</a>
            <div class="collapse navbar-collapse" id="navbarColor01">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                <a class="nav-link active" href="Odontologo.html">Odontólogos</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" href="Paciente.html">Pacientes</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" href="Servicio.html">Servicios</a>
                </li>
            </ul>
            <form class="d-flex">
                <input class="form-control me-sm-2" type="search" placeholder="Buscar" style="background-color: rgb(248, 248, 250);">
                <button id="btnBuscar" class="btn btn-secondary my-2 my-sm-0" type="submit">Buscar</button>
            </form>
            <button class="btn btn-primary" onclick="CerrarSesion()" style="margin: 30px;">Cerrar Sesión</button>
            </div>
        </div>
    </nav>
    <header>
        <h1>Servicios</h1>
        <p>Por favor completar los campos con sus respectivos datos</p>
    </header>

    <div class="container mt-4">
        <div class="d-flex flex-nowrap justify-content-center gap-4">
            <div class="card shadow p-4 mx-auto" style="max-width: 600px; margin-bottom: 30px;">
                <form id="formServicio" action="" method="post">
                    <label for="nomServicio" class="d-block mb-3">Nombre del Servicio
                    <select name="nombreServicio" id="nomServicio" class="form-select" style="border: 2px solid #d0e2ff; border-radius: 12px;" required>
                        <option value="#" selected>Seleccione el servicio</option>
                        <option value="Ortodoncia">Ortodoncia</option>
                        <option value="Evaluación">Evaluación Odontológica</option>
                        <option value="Tratamiento">Tratamiento de Caries+</option>
                        <option value="Limpieza">Limpieza Dental-</option>
                    </select>
                    </label>
                    <label for="Descripcion" class="d-block mb-3">Descripción
                        <input id="Descripcion" name="Descripcion" type="text" class="form-control" style="border: 2px solid #d0e2ff; border-radius: 12px;" required />
                    </label>
                    <label for="Precio" class="d-block mb-3">Precio Actual
                        <input id="Precio" name="Precio" type="number" step="0.01" min="0" placeholder="0" class="form-control" style="border: 2px solid #d0e2ff; border-radius: 12px;" required />
                    </label>
                    <label for="Duracion" class="d-block mb-3">Duración 
                        <input id="Duracion" name="Duracion" type="time" class="form-control" style="border: 2px solid #d0e2ff; border-radius: 12px;" required />
                    </label>
                    <div class="d-flex justify-content-end gap-2">
                        <a id="btnConsultar" href="#TablaServicio" class="btn btn-primary">Consultar</a>
                        <button id="btnRegistrar" type="submit"  class="btn btn-primary">Registrar</button>
                        <button id="btnActualizar" type="submit"  class="btn btn-primary">Actualizar</button>
                        <button id="btnEliminar" type="submit"  class="btn btn-primary">Eliminar</button>
                        <button id="btnCancelar" type="button" class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
                    </div>
                </form>
            </div>
            <script>
                function CerrarSesion(){
                    alert("Sesión Cerrada \n Usted ha salido del sistema exitosamente");
                    window.location.href="Login.html"
                }
                function cancelar(){
                    document.querySelector("#formServicio").reset();
                    window.location.hash = ""; //vuelve a la url nativa de la página
                }
            </script>
            <section id="TablaServicio" class="flex-grow-1">
                <table id="tServicio" class="table table-striped" style="margin-top: 20px; border: 5px solid rgb(107, 166, 255); ">
                    <thead class="table-light">
                        <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nombre del Servicio</th>
                        <th scope="col">Descripción</th>
                        <th scope="col">Precio Actual</th>
                        <th scope="col">Duración</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                        <th scope="row">1</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        </tr>
                        <tr>
                        <th scope="row">2</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        </tr>
                        <tr>
                        <th scope="row">3</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>
</body>
</html>
